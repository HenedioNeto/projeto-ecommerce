name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ========== USER SERVICE ==========
      - name: Make mvnw executable (User Service)
        run: chmod +x ./user-service/mvnw

      - name: Cache Maven packages (User Service)
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run User Service tests
        run: |
          cd user-service
          ./mvnw clean test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build User Service
        run: |
          cd user-service
          ./mvnw package -DskipTests

      # ========== PRODUCT SERVICE ==========
      - name: Make mvnw executable (Product Service)
        run: chmod +x ./product-service/mvnw

      - name: Run Product Service tests
        run: |
          cd product-service
          ./mvnw clean test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build Product Service
        run: |
          cd product-service
          ./mvnw package -DskipTests

      # ========== ORDER SERVICE ==========

      - name: Make mvnw executable (Order Service)
        run: chmod +x ./order-service/mvnw || true

      - name: Run Order Service tests
        run: |
            cd order-service
            ./mvnw clean test --batch-mode

      - name: Build Order Service
        run: |
            cd order-service
            ./mvnw package -DskipTests